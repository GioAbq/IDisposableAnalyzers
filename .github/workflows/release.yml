name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore IDisposableAnalyzers.sln

      - name: Build
        run: dotnet build IDisposableAnalyzers.sln -c Release --no-restore

      - name: Test
        run: dotnet test IDisposableAnalyzers.sln -c Release --no-build

      - name: Pack
        run: dotnet pack IDisposableAnalyzers/IDisposableAnalyzers.csproj -c Release --no-build -o artifacts

      - name: Push to NuGet
        run: dotnet nuget push "artifacts/*.nupkg" -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
